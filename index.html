<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ededed">
<title>闪信</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
:root{
  --bg:#ededed; --white:#fff; --bdr:#e0e0e0;
  --txt:#1a1a1a; --sub:#999; --green:#07c160;
  --glight:#95ec69; --red:#fa5151; --blue:#576b95;
  --nav:#1a1a1a; --tab:#f7f7f7;
  --safe-b:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
  background:var(--bg);color:var(--txt);min-height:100dvh;
  -webkit-tap-highlight-color:transparent;
  -webkit-user-select:none;user-select:none;
}

/* 顶部导航 */
.hd{
  height:44px;background:var(--nav);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:17px;font-weight:500;position:relative;flex-shrink:0;
}
.hd .hd-back{
  position:absolute;left:0;top:0;height:44px;width:60px;
  display:flex;align-items:center;padding-left:12px;font-size:16px;
  cursor:pointer;color:#fff;background:none;border:none;
}
.hd .hd-act{
  position:absolute;right:12px;top:0;height:44px;
  display:flex;align-items:center;font-size:15px;
  cursor:pointer;color:#fff;background:none;border:none;
}

/* 底部Tab */
.tabbar{
  height:calc(50px + var(--safe-b));padding-bottom:var(--safe-b);
  background:var(--tab);border-top:1px solid var(--bdr);
  display:flex;position:sticky;bottom:0;z-index:20;flex-shrink:0;
}
.tabbar .tb{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;cursor:pointer;color:var(--sub);font-size:10px;
}
.tabbar .tb.on{color:var(--green)}
.tabbar .tb .tbi{font-size:22px;position:relative}
.tabbar .tb .tbd{position:absolute;top:-2px;right:-8px;
  min-width:16px;height:16px;line-height:16px;border-radius:8px;
  background:var(--red);color:#fff;font-size:10px;text-align:center;padding:0 4px;
}

/* 页面 */
.pg{display:none;flex:1;overflow-y:auto;flex-direction:column}
.pg.on{display:flex}
.page-wrap{display:flex;flex-direction:column;height:100dvh;overflow:hidden}

/* 聊天列表 */
.chat-item{
  display:flex;align-items:center;gap:12px;padding:12px 16px;
  background:var(--white);cursor:pointer;border-bottom:1px solid var(--bdr);
}
.chat-item:active{background:#ececec}
.chat-avatar{
  width:48px;height:48px;border-radius:6px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:600;color:#fff;
  background:var(--green);
}
.chat-body{flex:1;min-width:0}
.chat-name{font-size:16px;font-weight:400}
.chat-preview{font-size:13px;color:var(--sub);margin-top:3px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chat-rt{text-align:right;flex-shrink:0}
.chat-time{font-size:12px;color:var(--sub)}
.chat-unread{display:inline-block;min-width:18px;height:18px;line-height:18px;
  border-radius:9px;background:var(--red);color:#fff;font-size:11px;
  text-align:center;padding:0 4px;margin-top:4px}

/* 空状态 */
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--sub);gap:12px}
.empty .eicon{font-size:56px}
.empty .etxt{font-size:14px}

/* 聊天详情 */
.chat-hd{
  height:44px;background:var(--nav);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:17px;font-weight:500;position:relative;flex-shrink:0;
}
.chat-hd .ch-back{
  position:absolute;left:0;top:0;height:44px;width:60px;
  display:flex;align-items:center;padding-left:12px;font-size:16px;
  cursor:pointer;color:#fff;background:none;border:none;
}
.chat-msgs{
  flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:14px;
  background:var(--bg);
}
.msg-wrap{display:flex;gap:8px;max-width:75%}
.msg-wrap.me{align-self:flex-end;flex-direction:row-reverse}
.msg-wrap.other{align-self:flex-start}
.msg-avatar{
  width:36px;height:36px;border-radius:4px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:600;color:#fff;
}
.msg-wrap.me .msg-avatar{background:var(--green)}
.msg-wrap.other .msg-avatar{background:var(--blue)}
.msg-bubble{
  padding:9px 12px;border-radius:4px;font-size:15px;line-height:1.5;
  word-break:break-word;position:relative;
}
.msg-wrap.other .msg-bubble{background:var(--white);color:var(--txt)}
.msg-wrap.me .msg-bubble{background:var(--glight);color:var(--txt)}
.msg-wrap.other .msg-bubble::before{
  content:'';position:absolute;left:-6px;top:10px;
  border:6px solid transparent;border-right-color:var(--white);border-left:0;
}
.msg-wrap.me .msg-bubble::before{
  content:'';position:absolute;right:-6px;top:10px;
  border:6px solid transparent;border-left-color:var(--glight);border-right:0;
}

/* 聊天底部 */
.chat-foot{
  display:flex;gap:10px;align-items:flex-end;padding:8px 12px;
  background:var(--tab);border-top:1px solid var(--bdr);flex-shrink:0;
  padding-bottom:calc(8px + var(--safe-b));
}
.chat-foot .tinp{
  flex:1;border:none;outline:none;background:var(--white);border-radius:4px;
  padding:10px 12px;font-size:15px;line-height:1.4;resize:none;
  max-height:100px;min-height:36px;
}
.chat-foot .tbtn{
  background:var(--green);color:#fff;border:none;border-radius:4px;
  padding:8px 16px;font-size:15px;cursor:pointer;flex-shrink:0;
}

/* 通讯录 */
.contact-item{
  display:flex;align-items:center;gap:12px;padding:12px 16px;
  background:var(--white);border-bottom:1px solid var(--bdr);cursor:pointer;
}
.contact-item:active{background:#ececec}

/* 通用cell */
.cell{
  display:flex;align-items:center;padding:14px 16px;
  background:var(--white);border-bottom:1px solid var(--bdr);cursor:pointer;
  gap:12px;
}
.cell:active{background:#ececec}
.cell .cl{flex:1;min-width:0}
.cell .ct{font-size:16px}
.cell .cs{font-size:12px;color:var(--sub);margin-top:2px}
.cell .cr{color:var(--sub);font-size:14px;flex-shrink:0}

/* 我的页面 */
.mine-hd{
  padding:30px 20px 20px;background:var(--white);text-align:center;
  border-bottom:1px solid var(--bdr);margin-bottom:12px;
}
.mine-avatar{
  width:64px;height:64px;border-radius:6px;background:var(--green);
  color:#fff;font-size:28px;font-weight:600;margin:0 auto 10px;
  display:flex;align-items:center;justify-content:center;
}
.mine-name{font-size:18px;font-weight:500}
.mine-id{font-size:12px;color:var(--sub);margin-top:4px;word-break:break-all}
.qr-wrap{margin-top:12px;display:flex;justify-content:center}
#qrcode canvas,#qrcode img{border-radius:4px}

/* 添加好友 */
.add-section{background:var(--white);margin-bottom:12px}
.add-section .as-t{font-size:13px;color:var(--sub);padding:12px 16px 6px}
.inp-row{display:flex;gap:10px;padding:0 16px 14px}
.inp-row input{
  flex:1;border:1px solid var(--bdr);border-radius:4px;padding:10px 12px;
  font-size:15px;outline:none;background:var(--white);
}
.inp-row input:focus{border-color:var(--green)}
.inp-row button{
  background:var(--green);color:#fff;border:none;border-radius:4px;
  padding:10px 18px;font-size:14px;cursor:pointer;white-space:nowrap;
}

/* Toast */
.toast-box{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:200;pointer-events:none}
.toast{
  background:rgba(0,0,0,.75);color:#fff;padding:10px 18px;border-radius:6px;
  font-size:14px;white-space:nowrap;animation:tIn .25s ease;
}
@keyframes tIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}

/* 弹窗 */
.modal{
  position:fixed;inset:0;z-index:100;display:none;
  background:rgba(0,0,0,.45);align-items:center;justify-content:center;padding:30px;
}
.modal.on{display:flex}
.modal .m{
  background:var(--white);border-radius:12px;width:100%;max-width:320px;overflow:hidden;
}
.modal .mh{padding:16px;text-align:center;font-size:17px;font-weight:500;border-bottom:1px solid var(--bdr)}
.modal .mb{padding:16px;text-align:center;font-size:15px;color:var(--sub);max-height:60vh;overflow-y:auto}
.modal .mf{display:flex;border-top:1px solid var(--bdr)}
.modal .mf button{flex:1;padding:14px;border:none;background:none;font-size:16px;cursor:pointer}
.modal .mf .ok{color:var(--green);font-weight:500}
.modal .mf .no{color:var(--sub);border-right:1px solid var(--bdr)}
</style>
</head>
<body>

<div class="page-wrap" id="appRoot">
  <!-- ========== 主界面 ========== -->
  <div class="hd" id="mainHd">闪信</div>
  <div class="pg on" id="pg-chats">
    <div id="chatList"></div>
    <div class="empty" id="noChats"><span class="eicon">💬</span><span class="etxt">暂无聊天</span></div>
  </div>
  <div class="pg" id="pg-contacts">
    <div id="contactList"></div>
    <div class="add-section" style="margin-top:12px">
      <div class="as-t">添加好友</div>
      <div class="inp-row">
        <input id="addInp1" placeholder="输入好友 ID">
        <button id="addBtn1">添加</button>
      </div>
      <div style="text-align:center;padding:0 16px 14px">
        <button id="scanBtn" style="background:var(--white);color:var(--blue);border:1px solid var(--blue);border-radius:4px;padding:10px 24px;font-size:14px;cursor:pointer;width:100%">📷 扫一扫添加</button>
      </div>
    </div>
  </div>
  <div class="pg" id="pg-mine">
    <div class="mine-hd">
      <div class="mine-avatar" id="mineAvatar">?</div>
      <div class="mine-name" id="mineName">未设置</div>
      <div class="mine-id" id="mineId">---</div>
    </div>
    <div class="cell" id="nameEditCell">
      <span>👤</span><div class="cl"><div class="ct">昵称</div><div class="cs" id="nameEditVal">点击设置</div></div><span class="cr">›</span>
    </div>
    <div class="cell" id="qrShowCell">
      <span>📱</span><div class="cl"><div class="ct">我的二维码</div><div class="cs">让好友扫一扫添加</div></div><span class="cr">›</span>
    </div>
  </div>
  <div class="tabbar">
    <div class="tb on" data-pg="chats"><span class="tbi">💬<span class="tbd" id="unreadBadge" style="display:none">0</span></span>消息</div>
    <div class="tb" data-pg="contacts"><span class="tbi">👥</span>通讯录</div>
    <div class="tb" data-pg="mine"><span class="tbi">👤</span>我</div>
  </div>
</div>

<!-- ========== 聊天详情（独立层） ========== -->
<div class="page-wrap" id="chatRoot" style="display:none">
  <div class="chat-hd">
    <button class="ch-back" id="chatBack">← 返回</button>
    <span id="chatTitle">---</span>
  </div>
  <div class="chat-msgs" id="chatMsgs"></div>
  <div class="chat-foot">
    <button id="attachBtn" style="background:none;border:none;font-size:24px;cursor:pointer;padding:4px">➕</button>
    <textarea class="tinp" id="msgInp" placeholder="" rows="1"></textarea>
    <button class="tbtn" id="sendBtn">发送</button>
  </div>
  <input type="file" id="fileInp" style="display:none" multiple>
</div>

<!-- 弹窗 -->
<div class="modal" id="modal">
  <div class="m">
    <div class="mh" id="modalHd"></div>
    <div class="mb" id="modalBd"></div>
    <div class="mf" id="modalFt"></div>
  </div>
</div>
<div class="toast-box" id="toastBox"></div>

<script>
// ======================== 全局 ========================
const LS={get(k,d){try{let v=localStorage.getItem('dl_'+k);return v??d}catch{return d}},set(k,v){try{localStorage.setItem('dl_'+k,v)}catch{}}};

let myId='',myName=LS.get('name',''),peer=null;
let friends={}; // {id:{name,online,conn,msgs:[],unread:0}}
let activeChat=null;

// ======================== PeerJS ========================
function initPeer(){
  if(peer){try{peer.destroy()}catch{}}
  const pid=LS.get('peerId','');
  peer=new Peer(pid||undefined);
  peer.on('open',id=>{
    myId=id;if(!pid)LS.set('peerId',id);
    refreshMine();
    console.log('Peer ready:',id);
  });
  peer.on('connection',conn=>setupConn(conn,conn.peer));
  peer.on('error',e=>{
    if(e.type==='unavailable-id'){LS.set('peerId','');initPeer();return}
    setTimeout(initPeer,5000);
  });
  peer.on('disconnected',()=>{if(peer&&!peer.destroyed)peer.reconnect()});
}

function connectTo(rid){
  if(rid===myId){toast('不能添加自己');return}
  if(friends[rid]){toast('已在好友列表');openChat(rid);return}
  toast('连接中...');
  const conn=peer.connect(rid,{reliable:true,serialization:'json'});
  const t=setTimeout(()=>{conn.close();toast('超时，请确认对方在线')},15000);
  conn.on('open',()=>{
    clearTimeout(t);conn.send({t:'hi',name:myName||'我',id:myId});setupConn(conn,rid);toast('连接成功');
  });
  conn.on('error',e=>{clearTimeout(t);toast('连接失败：'+(e.message||'对方不在线'))});
}

function setupConn(conn,rid){
  let done=false;
  conn.on('data',d=>{
    if(!done&&d.t==='hi'){
      done=true;
      if(!friends[rid])friends[rid]={name:d.name||rid,online:true,conn,msgs:[],unread:0};
      else{friends[rid].online=true;friends[rid].conn=conn;friends[rid].name=d.name||friends[rid].name}
      if(!d._ack)conn.send({t:'hi',name:myName||'我',id:myId,_ack:true});
      renderAll();
      return;
    }
    handleMsg(d,rid);
  });
  conn.on('close',()=>{if(friends[rid]){friends[rid].online=false;renderAll();if(activeChat===rid)document.getElementById('chatTitle').textContent=(friends[rid]?.name||rid)+' (离线)'}});
}

function handleMsg(d,rid){
  const f=friends[rid];if(!f)return;
  switch(d.t){
    case'msg':
      f.msgs.push({from:rid,text:d.text,time:d.time||Date.now()});
      if(activeChat!==rid)f.unread=(f.unread||0)+1;
      renderAll();
      break;
    case'file':
      f.msgs.push({from:rid,text:'[文件] '+d.name,time:Date.now(),file:d});
      if(activeChat!==rid)f.unread=(f.unread||0)+1;
      renderAll();toast('收到文件：'+d.name);
      break;
    case'file_data':recvChunk(d,rid);break;
    case'file_done':recvDone(d,rid);break;
  }
}

// ======================== 消息发送 ========================
function sendMsg(){
  const inp=document.getElementById('msgInp');
  const text=inp.value.trim();if(!text||!activeChat)return;
  const f=friends[activeChat];if(!f?.online){toast('对方不在线');return}
  f.conn.send({t:'msg',text,time:Date.now()});
  f.msgs.push({from:'me',text,time:Date.now()});
  inp.value='';inp.style.height='auto';
  renderChatMsgs();
}

// ======================== 文件传输 ========================
const CHUNK=8000,recvBuf={};
function sendFile(file,tid){
  const f=friends[tid];if(!f?.online){toast('对方不在线');return}
  if(file.size>200*1024*1024){toast('≤200MB');return}
  const fid=Date.now().toString(36)+Math.random().toString(36).slice(2,6);
  f.conn.send({t:'file',name:file.name,size:file.size,fid});
  f.msgs.push({from:'me',text:'[文件] '+file.name,time:Date.now()});
  renderChatMsgs();
  file.arrayBuffer().then(buf=>{
    const total=Math.ceil(buf.byteLength/CHUNK);
    (async()=>{
      for(let i=0;i<total;i++){
        const s=i*CHUNK,e=Math.min(s+CHUNK,buf.byteLength);
        f.conn.send({t:'file_data',fid,idx:i,total,data:ab2b64(buf.slice(s,e))});
        if(i%5===0)await sleep(10);
      }
      f.conn.send({t:'file_done',fid});toast('发送完成');
    })();
  });
}
function recvChunk(d,rid){
  if(!recvBuf[d.fid])recvBuf[d.fid]={name:d.name||'file',size:d.size||0,chunks:new Array(d.total),got:0};
  recvBuf[d.fid].chunks[d.idx]=b642ab(d.data);recvBuf[d.fid].got++;
}
function recvDone(d,rid){
  const b=recvBuf[d.fid];if(!b)return;
  const blob=new Blob(b.chunks.filter(Boolean)),url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=b.name;a.click();
  setTimeout(()=>URL.revokeObjectURL(url),60000);delete recvBuf[d.fid];
}
function ab2b64(buf){let s='';const u=new Uint8Array(buf);for(let i=0;i<u.length;i++)s+=String.fromCharCode(u[i]);return btoa(s)}
function b642ab(b64){const b=atob(b64),u=new Uint8Array(b.length);for(let i=0;i<b.length;i++)u[i]=b.charCodeAt(i);return u.buffer}
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}

// ======================== 渲染 ========================
function refreshMine(){
  document.getElementById('mineId').textContent=myId||'---';
  document.getElementById('mineAvatar').textContent=(myName||'?')[0].toUpperCase();
  document.getElementById('mineName').textContent=myName||'未设置';
  document.getElementById('nameEditVal').textContent=myName||'点击设置';
}

function renderAll(){renderChatList();renderContacts();renderChatMsgs();updateUnread();populateFileTarget()}

function renderChatList(){
  const list=document.getElementById('chatList'),empty=document.getElementById('noChats');
  const entries=Object.entries(friends).filter(([_,f])=>f.conn);
  if(!entries.length){list.innerHTML='';empty.style.display='flex';return}
  empty.style.display='none';
  list.innerHTML=entries.sort(([,a],[,b])=>{
    const la=a.msgs?.slice(-1)[0]?.time||0,lb=b.msgs?.slice(-1)[0]?.time||0;return lb-la;
  }).map(([id,f])=>{
    const last=f.msgs?.slice(-1)[0];
    const prev=last?(last.from==='me'?'我：':'')+last.text:'';
    const t=last?new Date(last.time):null;
    const ts=t?fmtMsgTime(t):'';
    return`<div class="chat-item" onclick="openChat('${id}')">
      <div class="chat-avatar">${(f.name||'?')[0].toUpperCase()}</div>
      <div class="chat-body"><div class="chat-name">${esc(f.name||id)}</div><div class="chat-preview">${esc(prev)}</div></div>
      <div class="chat-rt"><div class="chat-time">${ts}</div>${f.unread?`<div class="chat-unread">${f.unread>99?'99+':f.unread}</div>`:''}</div>
    </div>`;
  }).join('');
}

function renderContacts(){
  const list=document.getElementById('contactList');
  const entries=Object.entries(friends).filter(([_,f])=>f.conn);
  list.innerHTML=entries.map(([id,f])=>`<div class="contact-item" onclick="openChat('${id}')">
    <div class="chat-avatar">${(f.name||'?')[0].toUpperCase()}</div>
    <div class="chat-body"><div class="chat-name">${esc(f.name||id)}</div></div>
    <span style="color:${f.online?'var(--green)':'var(--sub)'};font-size:12px">${f.online?'在线':'离线'}</span>
  </div>`).join('');
}

function openChat(id){
  activeChat=id;const f=friends[id];if(!f)return;
  f.unread=0;
  document.getElementById('chatTitle').textContent=(f.name||id)+(f.online?'':' (离线)');
  document.getElementById('appRoot').style.display='none';
  document.getElementById('chatRoot').style.display='flex';
  renderAll();
}

function renderChatMsgs(){
  if(!activeChat)return;
  const box=document.getElementById('chatMsgs'),f=friends[activeChat];
  if(!f||!f.msgs?.length){box.innerHTML='';return}
  box.innerHTML=f.msgs.map(m=>{
    const isMe=m.from==='me';
    return`<div class="msg-wrap ${isMe?'me':'other'}">
      <div class="msg-avatar">${isMe?(myName||'我')[0].toUpperCase():(f.name||'?')[0].toUpperCase()}</div>
      <div class="msg-bubble">${esc(m.text)}</div>
    </div>`;
  }).join('');
  box.scrollTop=box.scrollHeight;
}

function updateUnread(){
  const total=Object.values(friends).reduce((s,f)=>s+(f.unread||0),0);
  const badge=document.getElementById('unreadBadge');
  if(total>0){badge.style.display='block';badge.textContent=total>99?'99+':total}
  else{badge.style.display='none'}
}

function populateFileTarget(){
  // 没什么需要populate的，文件直接从聊天详情发
}

// ======================== 工具 ========================
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function fmtMsgTime(d){
  const now=new Date(),diff=now-d;
  if(diff<60000)return'刚刚';
  if(diff<3600000)return Math.floor(diff/60000)+'分钟前';
  if(d.toDateString()===now.toDateString())return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
  return (d.getMonth()+1)+'/'+d.getDate();
}
function toast(m){
  const b=document.getElementById('toastBox'),e=document.createElement('div');
  e.className='toast';e.textContent=m;b.appendChild(e);
  setTimeout(()=>{e.style.opacity='0';e.style.transition='.2s';setTimeout(()=>e.remove(),250)},1800);
}
function showModal(title,body,buttons){
  const m=document.getElementById('modal');m.classList.add('on');
  document.getElementById('modalHd').textContent=title;
  document.getElementById('modalBd').innerHTML=body;
  const ft=document.getElementById('modalFt');ft.innerHTML='';
  buttons.forEach(([text,cls,fn])=>{
    const b=document.createElement('button');b.textContent=text;b.className=cls;b.onclick=()=>{m.classList.remove('on');fn&&fn()};ft.appendChild(b);
  });
}

// ======================== 事件 ========================
// Tab切换
document.querySelectorAll('.tb').forEach(t=>t.addEventListener('click',()=>{
  document.querySelectorAll('.tb').forEach(x=>x.classList.remove('on'));
  document.querySelectorAll('.pg').forEach(x=>x.classList.remove('on'));
  t.classList.add('on');
  document.getElementById('pg-'+t.dataset.pg).classList.add('on');
  if(t.dataset.pg==='chats')renderChatList();
  if(t.dataset.pg==='contacts')renderContacts();
  if(t.dataset.pg==='mine')refreshMine();
}));

// 添加好友
function doAdd(inp){
  const id=inp.value.trim();if(!id){toast('请输入ID');return}
  if(!myName){toast('请先在「我」页设置昵称');return}
  connectTo(id);inp.value='';
}
document.getElementById('addBtn1').addEventListener('click',()=>doAdd(document.getElementById('addInp1')));
document.getElementById('addInp1').addEventListener('keydown',e=>{if(e.key==='Enter')doAdd(e.target)});

// 扫码
let scanner=null;
document.getElementById('scanBtn').addEventListener('click',()=>{
  const readerId='qr-reader';
  showModal('扫一扫','<div id="'+readerId+'" style="width:100%;max-width:280px;margin:0 auto"></div>',[
    ['取消','no',()=>{if(scanner){scanner.stop().catch(()=>{});scanner=null}}]
  ]);
  setTimeout(()=>{
    scanner=new Html5Qrcode(readerId);
    scanner.start({facingMode:'environment'},{fps:10,qrbox:{width:220,height:220}},
      (text)=>{scanner.stop().catch(()=>{});scanner=null;document.getElementById('modal').classList.remove('on');
        if(!myName){toast('请先在「我」页设置昵称');return}
        connectTo(text);
      },
      ()=>{}
    ).catch(e=>{toast('无法打开摄像头：'+e.message);document.getElementById('modal').classList.remove('on')});
  },300);
});

// 返回聊天列表
document.getElementById('chatBack').addEventListener('click',()=>{
  activeChat=null;
  document.getElementById('chatRoot').style.display='none';
  document.getElementById('appRoot').style.display='flex';
  renderAll();
});

// 发送消息
document.getElementById('sendBtn').addEventListener('click',sendMsg);
document.getElementById('msgInp').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg()}});

// 附件
document.getElementById('attachBtn').addEventListener('click',()=>document.getElementById('fileInp').click());
document.getElementById('fileInp').addEventListener('change',()=>{
  if(!activeChat)return;const f=friends[activeChat];
  if(!f?.online){toast('对方不在线');return}
  for(const file of document.getElementById('fileInp').files)sendFile(file,activeChat);
  document.getElementById('fileInp').value='';
});

// 我的页面 - 昵称
document.getElementById('nameEditCell').addEventListener('click',()=>{
  showModal('设置昵称','<input id="nameModalInp" style="width:100%;border:1px solid var(--bdr);border-radius:4px;padding:10px;font-size:15px;outline:none" value="'+esc(myName||'')+'" placeholder="输入昵称" maxlength="20">',[
    ['取消','no'],['确定','ok',()=>{
      myName=document.getElementById('nameModalInp').value.trim();
      if(myName){LS.set('name',myName);refreshMine();toast('昵称已设置')}
    }]
  ]);
  setTimeout(()=>document.getElementById('nameModalInp').focus(),200);
});

// 我的页面 - 显示二维码
document.getElementById('qrShowCell').addEventListener('click',()=>{
  if(!myId){toast('等待连接...');return}
  showModal('我的二维码','<div id="modalQr" style="display:flex;justify-content:center"></div><div style="margin-top:8px;font-size:13px;color:var(--sub);word-break:break-all">'+myId+'</div>',[['关闭','ok']]);
  setTimeout(()=>{
    const wrap=document.getElementById('modalQr');
    if(typeof QRCode!=='undefined')new QRCode(wrap,{text:myId,width:200,height:200,colorDark:'#000',colorLight:'#fff',correctLevel:QRCode.CorrectLevel.M});
  },200);
});

// ======================== 初始化 ========================
initPeer();
</script>
